<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thinking Out Loud — History</title>
<style>
  :root {
    --bg: #0f0f12;
    --panel: #17171b;
    --panel-hi: #1e1e24;
    --fg: #e8e4dc;
    --muted: #868279;
    --border: rgba(255,255,255,.07);
    --accent: #c9b88a;
    --danger: #d97070;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  header h1 {
    margin: 0; font-size: 15px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  header .stat {
    color: var(--muted); font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .search {
    flex: 1 1 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--fg);
    font: inherit; font-size: 12.5px;
    outline: none;
    transition: border-color .15s;
  }
  .search:focus { border-color: rgba(201,184,138,.35); }
  .icon-btn {
    appearance: none; border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    font: inherit; font-size: 11px; font-weight: 500;
    padding: 7px 12px;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background .12s, border-color .12s;
  }
  .icon-btn:hover { background: var(--panel-hi); border-color: rgba(255,255,255,.14); }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.active { background: var(--panel-hi); border-color: rgba(201,184,138,.4); color: var(--accent); }

  main {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 0 32px;
  }
  .day-header {
    padding: 18px 24px 8px;
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
  }
  .empty {
    padding: 80px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
  }
  .empty h2 { color: var(--fg); font-weight: 500; margin: 0 0 6px; }

  .row {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 16px;
    align-items: start;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: background .12s;
  }
  .row:hover { background: rgba(255,255,255,.02); }
  .row .time {
    color: var(--muted);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
    letter-spacing: 0.02em;
  }
  .row .text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--fg);
    cursor: pointer;
    user-select: text;
    word-break: break-word;
  }
  .row .meta {
    display: flex; gap: 10px;
    margin-top: 4px;
    color: var(--muted);
    font-size: 10.5px;
  }
  .row .meta span { letter-spacing: 0.02em; }
  .row .meta .refined { color: var(--accent); }
  .row .actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity .15s;
  }
  .row:hover .actions { opacity: 1; }
  .row .actions button {
    appearance: none; border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    font: inherit; font-size: 10.5px; font-weight: 500;
    padding: 5px 9px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: background .1s, border-color .1s, color .1s;
  }
  .row .actions button:hover { background: var(--panel-hi); border-color: rgba(255,255,255,.18); }
  .row .actions button.danger:hover { border-color: var(--danger); color: var(--danger); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(40px);
    background: var(--panel-hi);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    box-shadow: 0 12px 28px -10px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Stats view */
  .stats {
    padding: 24px 24px 48px;
    max-width: 780px;
  }
  .stats .section-label {
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin: 24px 0 10px;
  }
  .stats .section-label:first-child { margin-top: 0; }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card .card-value {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .card .card-label {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
  }
  .card .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .bar-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 7px 0;
    font-size: 12.5px;
  }
  .bar-row .bar-name {
    position: relative;
    padding: 4px 10px 4px 10px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .bar-row .bar-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: rgba(201,184,138,.12);
    border-right: 1px solid rgba(201,184,138,.28);
    transition: width .3s;
  }
  .bar-row .bar-name span { position: relative; }
  .bar-row .bar-count {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 11.5px;
    white-space: nowrap;
  }
  .hour-chart {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 3px;
    height: 64px;
    align-items: flex-end;
    padding: 8px 0 4px;
  }
  .hour-chart .hour-bar {
    background: rgba(201,184,138,.22);
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: background .12s;
    position: relative;
  }
  .hour-chart .hour-bar:hover { background: rgba(201,184,138,.55); }
  .hour-chart .hour-bar[data-peak="1"] { background: rgba(201,184,138,.55); }
  .hour-axis {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 3px;
    font-size: 9.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    text-align: center;
  }
  .hour-axis span { visibility: hidden; }
  .hour-axis span:nth-child(6n+1) { visibility: visible; }
  .empty-stats {
    padding: 40px 0;
    color: var(--muted);
    text-align: center;
  }

  /* Scrollbar */
  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.07);
    border-radius: 4px;
  }
  main::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.14); }
</style>
</head>
<body>

<header>
  <h1>Thinking Out Loud</h1>
  <span class="stat" id="stat">0 entries</span>
  <input class="search" id="search" placeholder="Search dictations…" autocomplete="off" spellcheck="false">
  <button class="icon-btn" id="statsBtn">Stats</button>
  <button class="icon-btn" id="exportBtn">Export</button>
</header>

<main id="list">
  <div class="empty" id="empty"><h2>No dictations yet</h2>Press Right Ctrl and speak to add one.</div>
</main>

<main id="stats" class="stats" style="display:none;"></main>

<div class="toast" id="toast"></div>

<script>
  // Lua injects history via window.lw.load(jsonString).
  // JS → Lua via window.webkit.messageHandlers.lw.postMessage({action, index, text}).
  //   action: "copy" | "paste" | "delete" | "export"

  let history = [];

  function send(action, payload) {
    try {
      window.webkit.messageHandlers.lw.postMessage(Object.assign({ action }, payload || {}));
    } catch (e) {
      console.warn("lw message handler not available", e);
    }
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 1600);
  }

  function dayBucket(unix) {
    const now = new Date();
    const d = new Date(unix * 1000);
    const sameDay = (a, b) => a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
    const y = new Date(); y.setDate(y.getDate() - 1);
    if (sameDay(now, d)) return "Today";
    if (sameDay(y, d)) return "Yesterday";
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays < 7) return "This week";
    if (diffDays < 30) return "Earlier this month";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "long" });
  }

  function fmtTime(unix) {
    const d = new Date(unix * 1000);
    return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit", hour12: true });
  }

  function renderList(filter) {
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const q = (filter || "").toLowerCase().trim();
    const matches = history
      .map((e, i) => ({ e, i }))
      .filter(({ e }) => !q ||
        (e.text && e.text.toLowerCase().includes(q)) ||
        (e.refined && e.refined.toLowerCase().includes(q)));

    list.innerHTML = "";
    document.getElementById("stat").textContent =
      `${matches.length} of ${history.length} ${history.length === 1 ? "entry" : "entries"}`;

    if (matches.length === 0) {
      const msg = q
        ? `<h2>No matches</h2>for "${q.replace(/[<>&]/g, '')}"`
        : `<h2>No dictations yet</h2>Press Right Ctrl and speak to add one.`;
      list.innerHTML = `<div class="empty">${msg}</div>`;
      return;
    }

    let lastBucket = null;
    const frag = document.createDocumentFragment();
    matches.forEach(({ e, i }) => {
      const bucket = dayBucket(e.time);
      if (bucket !== lastBucket) {
        const h = document.createElement("div");
        h.className = "day-header";
        h.textContent = bucket;
        frag.appendChild(h);
        lastBucket = bucket;
      }
      const row = document.createElement("div");
      row.className = "row";
      const text = e.refined || e.text || "";
      const meta = [];
      meta.push(`<span>${e.app || "?"}</span>`);
      if (e.model) meta.push(`<span>${e.model}</span>`);
      if (e.chars != null) meta.push(`<span>${e.chars} ch</span>`);
      if (e.refined) meta.push(`<span class="refined">refined</span>`);
      if (e.lang) meta.push(`<span>${String(e.lang).toUpperCase()}</span>`);
      row.innerHTML = `
        <div class="time">${fmtTime(e.time)}</div>
        <div>
          <div class="text" data-idx="${i}">${escapeHtml(text)}</div>
          <div class="meta">${meta.join(" · ")}</div>
        </div>
        <div class="actions">
          <button data-act="copy" data-idx="${i}">Copy</button>
          <button data-act="paste" data-idx="${i}">Paste</button>
          <button class="danger" data-act="delete" data-idx="${i}">Delete</button>
        </div>
      `;
      frag.appendChild(row);
    });
    list.appendChild(frag);
  }

  function escapeHtml(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  document.getElementById("list").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-act]");
    if (btn) {
      const idx = Number(btn.dataset.idx);
      const entry = history[idx];
      if (!entry) return;
      const text = entry.refined || entry.text || "";
      if (btn.dataset.act === "copy") {
        send("copy", { text });
        toast("Copied to clipboard");
      } else if (btn.dataset.act === "paste") {
        send("paste", { text });
        toast("Pasted at cursor");
      } else if (btn.dataset.act === "delete") {
        send("delete", { time: entry.time });
        history.splice(idx, 1);
        renderList(document.getElementById("search").value);
        toast("Deleted");
      }
      return;
    }
    const textEl = e.target.closest(".text");
    if (textEl) {
      const idx = Number(textEl.dataset.idx);
      const entry = history[idx];
      if (entry) {
        const text = entry.refined || entry.text || "";
        send("copy", { text });
        toast("Copied to clipboard");
      }
    }
  });

  document.getElementById("search").addEventListener("input", (e) => {
    renderList(e.target.value);
  });

  document.getElementById("exportBtn").addEventListener("click", () => {
    send("export");
    toast("Exported to ~/Downloads");
  });

  // Stats view
  function computeStats(entries) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() / 1000;
    const weekStart = todayStart - 6 * 86400;
    const monthStart = todayStart - 29 * 86400;

    let chars = 0, refined = 0, inserted = 0;
    let today = 0, week = 0, month = 0;
    const apps = new Map();
    const models = new Map();
    const hours = new Array(24).fill(0);

    entries.forEach(e => {
      const c = e.chars || (e.text || "").length || 0;
      chars += c;
      if (e.refined) refined++;
      if (e.inserted) inserted++;
      if (e.time >= todayStart) today++;
      if (e.time >= weekStart) week++;
      if (e.time >= monthStart) month++;

      const app = e.app || "Unknown";
      apps.set(app, (apps.get(app) || 0) + 1);
      const model = e.model || "(none)";
      models.set(model, (models.get(model) || 0) + 1);

      const h = new Date(e.time * 1000).getHours();
      hours[h]++;
    });

    const n = entries.length;
    const words = Math.round(chars / 5);
    // ~40 wpm typing speed baseline; minutes saved vs typing it yourself
    const minutesSaved = Math.round(words / 40);

    const topApps = [...apps.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
    const topModels = [...models.entries()].sort((a, b) => b[1] - a[1]);

    return { n, chars, words, minutesSaved, refined, inserted, today, week, month, topApps, topModels, hours };
  }

  function renderBarList(rows, total) {
    if (!rows.length) return `<div class="empty-stats">No data yet.</div>`;
    const max = Math.max(...rows.map(r => r[1]));
    return `<div class="bar-list">${rows.map(([name, count]) => {
      const pct = total > 0 ? Math.round((count / total) * 100) : 0;
      const fillPct = max > 0 ? (count / max) * 100 : 0;
      return `<div class="bar-row">
        <div class="bar-name">
          <div class="bar-fill" style="width:${fillPct}%"></div>
          <span>${escapeHtml(name)}</span>
        </div>
        <div class="bar-count">${count} · ${pct}%</div>
      </div>`;
    }).join("")}</div>`;
  }

  function renderHourChart(hours) {
    const max = Math.max(...hours, 1);
    const peak = hours.indexOf(max);
    const bars = hours.map((c, h) => {
      const pct = (c / max) * 100;
      const isPeak = c > 0 && h === peak ? "1" : "0";
      return `<div class="hour-bar" style="height:${pct}%" data-peak="${isPeak}" title="${h}:00 — ${c}"></div>`;
    }).join("");
    const axis = Array.from({ length: 24 }, (_, h) => `<span>${h}</span>`).join("");
    return `<div class="hour-chart">${bars}</div><div class="hour-axis">${axis}</div>`;
  }

  function renderStats() {
    const s = computeStats(history);
    const container = document.getElementById("stats");
    if (s.n === 0) {
      container.innerHTML = `<div class="empty-stats">No dictations yet — stats will show up here.</div>`;
      return;
    }
    const refinePct = Math.round((s.refined / s.n) * 100);
    const insertPct = Math.round((s.inserted / s.n) * 100);
    container.innerHTML = `
      <div class="section-label">Summary</div>
      <div class="card-grid">
        <div class="card">
          <div class="card-value">${s.n}</div>
          <div class="card-label">Dictations</div>
          <div class="card-sub">${s.today} today · ${s.week} this wk</div>
        </div>
        <div class="card">
          <div class="card-value">${s.words.toLocaleString()}</div>
          <div class="card-label">Words</div>
          <div class="card-sub">${s.chars.toLocaleString()} chars</div>
        </div>
        <div class="card">
          <div class="card-value">~${s.minutesSaved}m</div>
          <div class="card-label">Saved vs typing</div>
          <div class="card-sub">at 40 wpm baseline</div>
        </div>
        <div class="card">
          <div class="card-value">${insertPct}%</div>
          <div class="card-label">Inserted</div>
          <div class="card-sub">${refinePct}% refined</div>
        </div>
      </div>

      <div class="section-label">Activity by hour</div>
      ${renderHourChart(s.hours)}

      <div class="section-label">Top apps</div>
      ${renderBarList(s.topApps, s.n)}

      <div class="section-label">Models</div>
      ${renderBarList(s.topModels, s.n)}
    `;
  }

  let statsMode = false;
  function toggleStats() {
    statsMode = !statsMode;
    document.getElementById("list").style.display = statsMode ? "none" : "";
    document.getElementById("stats").style.display = statsMode ? "" : "none";
    document.getElementById("search").style.display = statsMode ? "none" : "";
    document.getElementById("statsBtn").classList.toggle("active", statsMode);
    if (statsMode) renderStats();
  }
  document.getElementById("statsBtn").addEventListener("click", toggleStats);

  // Lua-facing API
  window.lw = {
    load(json) {
      try {
        history = JSON.parse(json) || [];
      } catch (e) {
        history = [];
      }
      renderList(document.getElementById("search").value);
      if (statsMode) renderStats();
    },
  };

  // If Lua didn't load yet (WKWebView race), request on our side via message handler.
  window.addEventListener("DOMContentLoaded", () => {
    send("ready");
  });
</script>
</body>
</html>
