<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    /* Column layout: transcript card grows upward from the pill.
       Pill stays anchored near the bottom so it doesn't jump around. */
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    gap: 8px; padding: 10px 10px 14px 10px;
    box-sizing: border-box;
  }

  /* Transcript card — theme-independent dark glass for guaranteed legibility
     over any wallpaper. Sits above the pill, only shown when body.has-transcript. */
  .transcript-card {
    display: none;
    width: fit-content;   /* sizes to content */
    min-width: 200px;
    max-width: 360px;
    max-height: 160px;    /* ~8 lines; scroll past that */
    overflow-y: auto;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(20, 20, 22, 0.78);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35), inset 0 0 0 0.5px rgba(255,255,255,0.12);
    color: #f4f4f5;
    font-size: 13px; line-height: 1.5;
    letter-spacing: 0.01em;
    text-align: left;
    white-space: pre-wrap; word-break: break-word;
    transition: max-height 0.15s ease-out;
  }
  body.has-transcript .transcript-card { display: block; }
  /* Hide scrollbar chrome — content-only look */
  .transcript-card::-webkit-scrollbar { width: 0; }
  /* Delta text fades in so new words read as additions, not a whole repaint. */
  .transcript-card .tx-new {
    animation: txFadeIn 0.25s ease-out;
  }
  @keyframes txFadeIn {
    from { opacity: 0.2; }
    to   { opacity: 1; }
  }

  /* ─── Shared primitives ─────────────────────────────────────── */
  .overlay {
    display: flex; align-items: center;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    position: relative;
  }
  .dot {
    border-radius: 50%; flex: 0 0 auto;
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 0.95; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  /* Refine states — override per-theme dot color + pulse speed. */
  body.refine-refining .dot {
    background: #f59e0b !important;
    animation: pulseDot 0.9s ease-in-out infinite;
  }
  body.refine-error .dot {
    background: #ef4444 !important;
    animation: flashDot 0.35s ease-in-out 4;
  }
  @keyframes flashDot {
    0%, 100% { opacity: 1; transform: scale(1.1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }
  .wave { display: flex; align-items: center; flex: 1 1 auto; justify-content: space-between; }
  .wave span {
    border-radius: 1px;
    height: 20%;
    animation: waveBar 1.1s ease-in-out infinite;
  }
  /* Pill stays visible throughout (recording → refining → brief linger).
     The transcript lives in the card above, not inside the pill. */
  .wave span:nth-child(1)  { animation-delay: -0.00s; }
  .wave span:nth-child(2)  { animation-delay: -0.07s; }
  .wave span:nth-child(3)  { animation-delay: -0.14s; }
  .wave span:nth-child(4)  { animation-delay: -0.21s; }
  .wave span:nth-child(5)  { animation-delay: -0.28s; }
  .wave span:nth-child(6)  { animation-delay: -0.35s; }
  .wave span:nth-child(7)  { animation-delay: -0.42s; }
  .wave span:nth-child(8)  { animation-delay: -0.49s; }
  .wave span:nth-child(9)  { animation-delay: -0.56s; }
  .wave span:nth-child(10) { animation-delay: -0.63s; }
  .wave span:nth-child(11) { animation-delay: -0.70s; }
  .wave span:nth-child(12) { animation-delay: -0.77s; }
  .wave span:nth-child(13) { animation-delay: -0.84s; }
  .wave span:nth-child(14) { animation-delay: -0.91s; }
  .wave span:nth-child(15) { animation-delay: -0.98s; }
  .wave span:nth-child(16) { animation-delay: -1.05s; }
  .wave span:nth-child(17) { animation-delay: -1.12s; }
  .wave span:nth-child(18) { animation-delay: -1.19s; }
  .wave span:nth-child(19) { animation-delay: -1.26s; }
  .wave span:nth-child(20) { animation-delay: -1.33s; }
  @keyframes waveBar {
    0%, 100% { height: 12%; opacity: 0.5; }
    15%  { height: 95%; opacity: 1; }
    30%  { height: 28%; opacity: 0.7; }
    45%  { height: 80%; opacity: 1; }
    60%  { height: 35%; opacity: 0.75; }
    75%  { height: 90%; opacity: 1; }
    90%  { height: 20%; opacity: 0.6; }
  }
  /* Live-metered waveform: Lua pushes RMS levels via window.lw.level(), JS sets
     inline heights. The CSS fallback animation is disabled while live. */
  .wave.live span {
    animation: none !important;
    transition: height 60ms linear, opacity 60ms linear;
  }
  .timer {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 10.5px; opacity: 0.65;
    flex: 0 0 auto; letter-spacing: 0.03em;
  }
  /* Timer stays visible throughout so its layout slot doesn't leave a dead
     gap next to the bars during the non-recording linger phase. */

  /* (old in-pill .transcript removed — text now renders in .transcript-card above.) */

  /* ===========================================================
     ★ LIQUID GLASS — Apple iOS 26 / macOS Tahoe
     =========================================================== */
  body.theme-liquid .overlay {
    width: 260px; height: 46px;
    padding: 0 22px;
    /* Dark tint behind the glass so white contents stay legible over ANY backdrop
       (light wallpaper, light browser window, etc). Without this the white
       text/bars vanish on light backgrounds. */
    background: rgba(20, 20, 28, 0.38);
    backdrop-filter: blur(40px) saturate(1.8) brightness(0.95);
    -webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(0.95);
    border-radius: 24px;
    gap: 14px;
    color: #fdfdfc;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);  /* contrast halo */
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.35),
      inset 0 -1px 0 rgba(0,0,0,0.2),
      0 0 0 0.5px rgba(0,0,0,0.35),
      0 16px 40px -12px rgba(0,0,0,0.45),
      0 2px 6px -2px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  body.theme-liquid .overlay::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.42) 0%,
      rgba(255,255,255,0.08) 28%,
      transparent 55%);
    pointer-events: none;
  }
  body.theme-liquid .overlay::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(255,255,255,0.24) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 100%, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  body.theme-liquid .overlay > * { position: relative; z-index: 1; }
  body.theme-liquid .dot { width: 7px; height: 7px; background: #ff453a;
    box-shadow: 0 0 8px rgba(255,69,58,0.6), 0 0 0 2px rgba(255,69,58,0.12); }
  body.theme-liquid .wave { height: 22px; gap: 3px; }
  body.theme-liquid .wave span { width: 2px; background: rgba(255,255,255,0.95);
    box-shadow: 0 0 4px rgba(255,255,255,0.3); }
  body.theme-liquid .timer { color: rgba(255,255,255,0.78); }

  /* ─── Editorial ─────────────────────────────────────────────── */
  body.theme-editorial .overlay {
    width: 280px; height: 40px;
    padding: 0 18px 0 14px;
    background: #111112;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    gap: 14px;
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.04) inset,
      0 10px 30px -12px rgba(0,0,0,0.6),
      0 0 0 1px rgba(0,0,0,0.4);
    color: #eaeae6;
  }
  body.theme-editorial .overlay::before {
    content: ""; width: 2px; height: 14px; background: #d4884c;
    border-radius: 1px; margin-right: 2px; flex: 0 0 auto;
  }
  body.theme-editorial .dot { display: none; }
  body.theme-editorial .wave { height: 16px; gap: 3px; }
  body.theme-editorial .wave span { width: 2px; background: #d8d6d0; }
  body.theme-editorial .timer { color: #6a6a66; font-size: 10px; }

  /* ─── Fog ───────────────────────────────────────────────────── */
  body.theme-fog .overlay {
    width: 260px; height: 44px; padding: 0 22px;
    background: #ece6dc; border-radius: 22px; gap: 14px;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.25),
                0 1px 2px rgba(0,0,0,0.1),
                inset 0 0 0 1px rgba(0,0,0,0.03);
    color: #3a3a38;
  }
  body.theme-fog .dot { width: 5px; height: 5px; background: #c94a4a; }
  body.theme-fog .wave { height: 16px; gap: 3px; }
  body.theme-fog .wave span { width: 2px; background: #5a6b7e; opacity: 0.75; }
  body.theme-fog .timer { color: #8a8985; }

  /* ─── Ink ───────────────────────────────────────────────────── */
  body.theme-ink .overlay {
    width: 260px; height: 44px; padding: 0 22px;
    background: #15151a;
    border: 1px solid rgba(232,224,208,0.08);
    border-radius: 22px; gap: 14px; color: #e8e0d0;
    box-shadow: 0 8px 24px -6px rgba(0,0,0,0.6);
  }
  body.theme-ink .dot { width: 5px; height: 5px; background: #c9b88a; }
  body.theme-ink .wave { height: 18px; gap: 3px; }
  body.theme-ink .wave span { width: 1.5px; background: #c9b88a; }
  body.theme-ink .timer { color: #6a6a65; }

  /* ─── Glass Black ───────────────────────────────────────────── */
  body.theme-glass-black .overlay {
    width: 260px; padding: 10px 18px;
    background: rgba(18,18,22,0.55);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px; gap: 12px;
    color: rgba(255,255,255,0.92);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  body.theme-glass-black .dot { width: 6px; height: 6px; background: #ef4444; }
  body.theme-glass-black .wave { height: 22px; gap: 3px; }
  body.theme-glass-black .wave span { width: 2px; background: rgba(255,255,255,0.85); }

  /* ─── Neon ──────────────────────────────────────────────────── */
  body.theme-neon .overlay {
    width: 260px; padding: 10px 18px;
    background: linear-gradient(135deg, #050010 0%, #0a0014 100%);
    border: 1px solid rgba(255,0,200,0.4);
    border-radius: 28px; gap: 12px; color: #00ffff;
    box-shadow: 0 0 24px rgba(255,0,200,0.25),
                0 0 60px rgba(0,255,255,0.08);
  }
  body.theme-neon .dot { width: 6px; height: 6px; background: #ff00c8;
    box-shadow: 0 0 12px #ff00c8; }
  body.theme-neon .wave { height: 22px; gap: 3px; }
  body.theme-neon .wave span { width: 2px;
    background: linear-gradient(180deg, #00ffff 0%, #ff00c8 100%);
    box-shadow: 0 0 6px rgba(0,255,255,0.4); }
  body.theme-neon .timer { color: #00ffff;
    text-shadow: 0 0 8px rgba(0,255,255,0.6); }

  /* ─── Arc Card ──────────────────────────────────────────────── */
  body.theme-arc-card .overlay {
    width: 240px; padding: 14px 18px;
    background: white; border-radius: 16px; gap: 12px;
    font-family: -apple-system, "SF Pro Rounded", sans-serif;
    font-weight: 500; color: #1c1c1e;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3),
                0 2px 6px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,165,0,0.3);
  }
  body.theme-arc-card .dot { width: 6px; height: 6px; background: #ff3b30; }
  body.theme-arc-card .wave { height: 22px; gap: 3px; }
  body.theme-arc-card .wave span { width: 2px;
    background: linear-gradient(180deg, #ff9500 0%, #ff2d55 100%); }
  body.theme-arc-card .timer { color: #6b7280; }
</style>
</head>
<body class="theme-liquid">
  <div class="transcript-card"></div>
  <div class="overlay">
    <div class="dot"></div>
    <div class="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="timer">0:00</div>
  </div>
<script>
  // Lua ↔ JS bridge. Lua calls these via overlay:evaluateJavaScript("lw.foo(...)").
  window.lw = {
    setRecording(on) {
      document.body.classList.toggle("recording", !!on);
      if (on) {
        document.body.classList.remove("has-transcript", "refine-refining", "refine-error");
        const card = document.querySelector(".transcript-card");
        if (card) { card.textContent = ""; card._tx = ""; }
      }
    },
    setTimer(txt) {
      document.querySelector(".timer").textContent = txt || "0:00";
    },
    setTranscript(txt) {
      const el = document.querySelector(".transcript-card");
      document.body.classList.toggle("has-transcript", !!txt);
      if (!txt) { el.textContent = ""; el._tx = ""; return; }

      // Diff against what's already rendered. Whisper partials re-transcribe
      // the whole stream, so usually the new text extends what's shown.
      // Only append the delta — no repaint on stable text → no flicker.
      const prev = el._tx || "";
      let common = 0;
      const n = Math.min(prev.length, txt.length);
      while (common < n && prev[common] === txt[common]) common++;

      // If the new text shares ANY prefix with what's shown (even a few chars),
      // preserve that prefix and only re-render the divergent tail. This keeps
      // the card stable during normal cumulative growth; only truly re-worded
      // sections flicker, and only for their own segment.
      if (common === prev.length && common > 0) {
        // Pure append — stable text untouched; just add the new tail span.
        const span = document.createElement("span");
        span.className = "tx-new";
        span.textContent = txt.slice(common);
        el.appendChild(span);
      } else if (common > 0 && prev.length > 0) {
        // Whisper re-worded from `common` onward. Keep stable prefix, replace
        // only the tail. The earlier nodes are consolidated into one text node
        // (cheaper) but the user still sees those words uninterrupted.
        el.textContent = txt.slice(0, common);
        const span = document.createElement("span");
        span.className = "tx-new";
        span.textContent = txt.slice(common);
        el.appendChild(span);
      } else {
        // First paint (prev was empty) or no overlap — single render.
        el.textContent = txt;
      }
      el._tx = txt;
      el.scrollTop = el.scrollHeight;
    },
    // Refine status driven from Lua. state: "idle" | "refining" | "error".
    // `reason` is the structured error code (shown as tooltip for debugging).
    setRefineState(state, reason) {
      const b = document.body;
      b.classList.remove("refine-refining", "refine-error");
      if (state === "refining") {
        b.classList.add("refine-refining");
      } else if (state === "error") {
        b.classList.add("refine-error");
        if (reason) b.setAttribute("data-refine-reason", reason);
        // Auto-clear the red flash after the CSS animation finishes.
        setTimeout(() => b.classList.remove("refine-error"), 1500);
      }
    },
  };

  // Audio-reactive waveform. Lua calls window.lw.level(0..1) at ~20Hz from the
  // ffmpeg astats stream callback. Each call advances a ring buffer; bars show
  // the last N samples (oldest left, newest right). Falls back to the CSS
  // keyframe animation if level() is never called.
  (function() {
    const wave = document.querySelector(".wave");
    const bars = wave.querySelectorAll("span");
    const N = bars.length;
    const ring = new Float32Array(N);
    let head = -1;
    let rafPending = false;
    let idleTimer = null;

    function render() {
      rafPending = false;
      for (let i = 0; i < N; i++) {
        const age = (N - 1) - i;
        const idx = (head - age + N) % N;
        const v = ring[idx];
        const h = 15 + v * 80;
        bars[i].style.height = h.toFixed(1) + "%";
        bars[i].style.opacity = (0.5 + v * 0.5).toFixed(2);
      }
    }

    window.lw.level = function(v) {
      if (!wave.classList.contains("live")) wave.classList.add("live");
      head = (head + 1) % N;
      ring[head] = v < 0 ? 0 : (v > 1 ? 1 : v);
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(render);
      }
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        wave.classList.remove("live");
        ring.fill(0); head = -1;
        for (let i = 0; i < N; i++) {
          bars[i].style.height = "";
          bars[i].style.opacity = "";
        }
      }, 300);
    };
  })();
</script>
</body>
</html>
